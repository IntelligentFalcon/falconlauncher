name: Build Tauri App

on:
  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:
    inputs:
      release_draft:
        description: 'Create as draft release?'
        type: boolean
        default: true
      prerelease:
        description: 'Mark as prerelease?'
        type: boolean
        default: false

  # Optional: run automatically on push to main branch
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'Cargo.lock'

# Allow the workflow to create releases and upload artifacts
permissions:
  contents: write

# Cancel any in-progress workflow for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.release_draft || true }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.release_draft || true }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

  build-macos:
    runs-on: macos-latest  # macOS 14 (ARM64) or macOS 13 (x86_64)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.release_draft || true }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
